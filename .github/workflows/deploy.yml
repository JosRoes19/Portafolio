name: Build & Deploy Portafolio

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir y subir imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/portafolio:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Conectar y desplegar en servidor
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            # Usando la estructura de carpetas que me mostraste
            cd /home/${{ secrets.SSH_USER }}/docker/proyectos/portafolio
            
            # Descargar la última imagen
            docker pull ${{ secrets.DOCKER_USERNAME }}/portafolio:latest
            
            # Detener y eliminar el contenedor antiguo si existe
            docker stop portafolio-web || true
            docker rm portafolio-web || true
            
            # Ejecutar el nuevo contenedor
            docker run -d \
              --name portafolio-web \
              -p 8080:80 \
              --restart always \
              ${{ secrets.DOCKER_USERNAME }}/portafolio:latest
            
            # Limpiar imágenes y contenedores viejos
            docker system prune -f